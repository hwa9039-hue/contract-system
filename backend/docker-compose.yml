# NAS 또는 PC에서 backend 폴더 안에서 실행:
#   docker compose build --no-cache && docker compose up -d --force-recreate
#
# 동일 폴더에 .env 를 두면 아래 ${변수} 로 덮어쓸 수 있습니다. (.env.example 참고)
# Synology에서 compose.yaml 만 쓰는 경우 contract-backend 서비스에도 같은 environment 를 넣어주세요.

services:
  contract-backend:
    build: .
    image: contract-backend-contract-backend:latest
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartdi:Smartdi2025!@192.168.0.100:5433/smartdi}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://contract.signtelecom-smartdi.com,https://contract-system-2ev.pages.dev,http://localhost:5173,http://127.0.0.1:5173}
      JWT_SECRET: ${JWT_SECRET:-20262026signtelecomsmartdi20262026}
      AUTH_SHARED_PASSWORD: ${AUTH_SHARED_PASSWORD:-smartdi2026!}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
